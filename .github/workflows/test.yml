name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - name: Generate templ
        run: go tool templ generate

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - name: Generate templ
        run: go tool templ generate

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - name: Download dependencies
        run: go mod download

      - name: Generate templ
        run: go tool templ generate

      - name: Run unit tests with coverage
        run: go test -v ./internal/... -coverprofile=coverage.out -covermode=atomic -run "^Test[^I]" -skip "Integration"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          verbose: true
        continue-on-error: true

  race-test:
    name: Race Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - name: Download dependencies
        run: go mod download

      - name: Generate templ
        run: go tool templ generate

      - name: Run tests with race detector
        run: go test -race -short ./internal/... -run "^Test[^I]" -skip "Integration"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      - name: Generate templ
        run: go tool templ generate

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          files=$(gofmt -l . | grep -v '_templ.go' || true)
          echo "$files"
          test -z "$files"

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"

      # pilothoused links libpam via cgo. Install libpam headers for the native
      # build, plus the aarch64 cross toolchain and arm64 libpam for arm64.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpam0g-dev
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo dpkg --add-architecture arm64
            # Pin existing repositories to amd64 so apt does not try to fetch
            # arm64 from mirrors that don't serve it (e.g. security.ubuntu.com).
            sudo sed -i 's|^Types: deb|Types: deb\nArchitectures: amd64|' /etc/apt/sources.list.d/ubuntu.sources
            sudo tee /etc/apt/sources.list.d/arm64-ports.sources >/dev/null <<'EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-security
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu libpam0g-dev:arm64
          fi

      - name: Generate templ
        run: go tool templ generate

      - name: Build binaries
        run: |
          export GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=1
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc CGO_LDFLAGS=-L/usr/lib/aarch64-linux-gnu
          fi
          go build -buildvcs=false -o bin/pilothouse ./cmd/pilothouse
          go build -buildvcs=false -o bin/pilothoused ./cmd/pilothoused
          ls -lh bin/
