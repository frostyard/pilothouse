# .github/workflows/snapshot.yml
name: snapshot

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # Only run if the Tests workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      # pilothoused links libpam and (with -tags sdjournal) libsystemd via cgo;
      # install the aarch64 cross toolchain and the arm64 headers so the arm64
      # build can compile and link.
      - name: Install cross toolchain
        run: |
          sudo dpkg --add-architecture arm64
          # Pin the runner's existing repositories to amd64 so apt does not try
          # to fetch arm64 from mirrors that don't serve it (e.g. 404s from
          # security.ubuntu.com).
          sudo sed -i 's|^Types: deb|Types: deb\nArchitectures: amd64|' /etc/apt/sources.list.d/ubuntu.sources
          # Provide arm64 packages from ports.ubuntu.com.
          sudo tee /etc/apt/sources.list.d/arm64-ports.sources >/dev/null <<'EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-security
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libpam0g-dev libsystemd-dev libpam0g-dev:arm64 libsystemd-dev:arm64

      - name: Run GoReleaser Snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --nightly --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
