# .github/workflows/release.yml
name: goreleaser

on:
  push:
    # run only against tags
    tags:
      - "*"

permissions:
  contents: write
  # packages: write
  # issues: write
  # id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      # pilothoused links libpam and (with -tags sdjournal) libsystemd via cgo;
      # install the aarch64 cross toolchain and the arm64 headers so the arm64
      # build can compile and link.
      - name: Install cross toolchain
        run: |
          sudo dpkg --add-architecture arm64
          # Pin the runner's existing repositories to amd64 so apt does not try
          # to fetch arm64 from mirrors that don't serve it (e.g. 404s from
          # security.ubuntu.com).
          sudo sed -i 's|^Types: deb|Types: deb\nArchitectures: amd64|' /etc/apt/sources.list.d/ubuntu.sources
          # Provide arm64 packages from ports.ubuntu.com.
          sudo tee /etc/apt/sources.list.d/arm64-ports.sources >/dev/null <<'EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-security
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libpam0g-dev libsystemd-dev libpam0g-dev:arm64 libsystemd-dev:arm64
      # More assembly might be required: Docker logins, GPG, etc.
      # It all depends on your needs.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro'
          distribution: goreleaser-pro
          # 'latest', 'nightly', or a semver
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Your GoReleaser Pro key, if you are using the 'goreleaser-pro' distribution
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Publish to frostyard repo
        uses: frostyard/repogen/.github/actions/publish-to-r2@main
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: frostyardrepo
          purge-cache: "true"
          cloudflare-zone: ${{ secrets.CLOUDFLARE_ZONE }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          gpg-private-key: ${{ secrets.REPOGEN_GPG_KEY }}
          packages-dir: ./dist
          package-type: deb # or sysext
          base-url: https://repository.frostyard.org # required for sysext

      - name: Kickoff snosi
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ORG_PAT }}
          repository: frostyard/snosi
          event-type: build
